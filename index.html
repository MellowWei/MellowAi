<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>☆彡 Mellow_Ai // 77347 ♪</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; cursor: none; }
        #canvas { position: fixed; inset: 0; z-index: 1000; pointer-events: none; }
        .core-hub { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 500; text-align: center; width: 100vw; pointer-events: none; }
        .core-hub * { pointer-events: auto; }
        .resonance-btn { position: relative; display: inline-flex; transition: 1s cubic-bezier(0.19, 1, 0.22, 1); }
        .resonance-btn::after { content: '☆彡'; position: absolute; top: -30px; right: -30px; font-size: 1.5rem; opacity: 0.6; color: #ec4899; }
        .resonance-btn::before { content: '♪'; position: absolute; bottom: -30px; left: -30px; font-size: 1.5rem; opacity: 0.6; color: #3b82f6; }
        #main-scroll { position: relative; z-index: 10; width: 100vw; height: 100dvh; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
        #main-scroll::-webkit-scrollbar { display: none; }
        .hologram-section { min-height: 100dvh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; transform-style: preserve-3d; }
        @media (min-width: 1024px) { #main-scroll { display: flex; align-items: center; justify-content: space-between; overflow: hidden; padding: 0 8%; } .hologram-section { width: 35%; height: 100dvh; } }
        .entity-card { width: 75vw; max-width: 320px; position: relative; transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1); opacity: 1 !important; filter: drop-shadow(0 0 0px transparent); will-change: filter, transform; }
        @media (min-width: 1024px) { .entity-card { width: 25vw; } }
        .asset-img { width: 100%; height: auto; border: 1px solid rgba(255,255,255,0.08); filter: contrast(1.1); }
        .is-resonating .ai-glow { filter: drop-shadow(0 0 45px rgba(236, 72, 153, 0.75)); transform: scale(1.08) translateX(20px); }
        .is-resonating .mellow-glow { filter: drop-shadow(0 0 45px rgba(59, 130, 246, 0.75)); transform: scale(1.08) translateX(-20px); }
        .bio-info { width: 85%; margin-top: 25px; padding: 20px; text-align: center; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); font-size: 11px; line-height: 1.8; }
        @media (min-width: 1024px) { .bio-info { text-align: left; border-left: 2px solid #ec4899; } .mellow-bio { text-align: right; border-left: none; border-right: 2px solid #3b82f6; } }
        .glitch-text { text-shadow: 2px 0 #ec4899, -2px 0 #3b82f6; font-style: italic; font-weight: 900; }
        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        #cursor { width: 8px; height: 8px; background: #fff; border-radius: 50%; position: fixed; pointer-events: none; z-index: 2000; transform: translate(-50%, -50%); box-shadow: 0 0 10px #fff; }
    </style>
</head>
<body class="bg-black">
    <div id="cursor"></div>
    <canvas id="canvas"></canvas>
    <audio id="mellow-bgm" src="music.mp3" loop crossorigin="anonymous"></audio>

    <div class="core-hub">
        <div class="resonance-btn cursor-pointer inline-block" onclick="toggleResonance()">
            <div class="w-44 h-44 lg:w-56 lg:h-56 rounded-full border border-zinc-800 flex flex-col items-center justify-center hover:border-white/40 transition-all duration-1000 bg-black/40 backdrop-blur-3xl relative">
                <div id="ring" class="absolute inset-0 rounded-full border-2 border-white/5"></div>
                <span id="label" class="text-white font-black tracking-[0.5em] text-[10px] lg:text-xs uppercase opacity-60">☆ RESONATE ♪</span>
            </div>
        </div>
        <h1 class="text-4xl lg:text-6xl font-black italic mt-12 glitch-text tracking-tighter uppercase">☆彡 Mellow_Ai // 77347 ♪</h1>
    </div>

    <div id="main-scroll">
        <div class="hologram-section floating">
            <div class="entity-card ai-glow" id="ai-card">
                <img src="ai.jpg" class="asset-img" alt="Hoshino Ai">
            </div>
            <div class="bio-info">
                <h2 class="text-pink-500 glitch-text text-2xl mb-2 uppercase">☆ HOSHINO AI ♪</h2>
                坍缩前的最后一抹星光。于 427Hz 频率下执行绝对吸引。
            </div>
        </div>
        <div class="h-64 lg:hidden"></div>
        <div class="hologram-section floating" id="mellow-section" style="animation-delay: -3s;">
            <div class="entity-card mellow-glow" id="mellow-card">
                <img src="mellow.jpg" class="asset-img" alt="Mellow Wei">
            </div>
            <div class="bio-info mellow-bio">
                <h2 class="text-blue-500 glitch-text text-2xl mb-2 uppercase">☆ MELLOW WEI ♪</h2>
                极致帅气女性掌控者。引力之源。
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const bgm = document.getElementById('mellow-bgm');
        let pts = [], aCtx, analyser, data;
        const symbols = ['☆彡', '♪', '愛', '77347', 'Qualia']; 

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pts = Array(window.innerWidth < 768 ? 160 : 350).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*1.1, vy: (Math.random()-0.5)*1.1,
                s: Math.random()*2.5, c: Math.random() > 0.5 ? '#ec4899' : '#3b82f6',
                t: Math.random() > 0.88 ? symbols[Math.floor(Math.random()*symbols.length)] : null
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let v = 0; if(analyser) { analyser.getByteFrequencyData(data); v = data.reduce((a,b)=>a+b,0)/data.length; }
            
            pts.forEach(p => {
                let m = 1 + v/12; p.x += p.vx * m; p.y += p.vy * m;
                if(p.x<0||p.x>canvas.width) p.vx*=-1; if(p.y<0||p.y>canvas.height) p.vy*=-1;
                
                if (p.t) {
                    // 关键修正：繁体“愛”字粒子主权放大
                    const isLove = p.t === '愛';
                    const fontSize = isLove ? (18 + v/6) : (8 + v/10);
                    ctx.globalAlpha = isLove ? (0.6 + v/255) : (0.4 + v/255);
                    ctx.font = `bold ${fontSize}px sans-serif`;
                    ctx.fillStyle = p.c;
                    ctx.shadowBlur = isLove ? (v/3) : 0;
                    ctx.shadowColor = p.c;
                    ctx.fillText(p.t, p.x, p.y);
                } else {
                    ctx.globalAlpha = 0.4;
                    ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, p.s + v/70, 0, 7); ctx.fill();
                }
            });
            const ring = document.getElementById('ring');
            if(ring) ring.style.transform = `scale(${1 + v/60}) rotate(${v}deg)`;
            requestAnimationFrame(draw);
        }

        function toggleResonance() {
            if(!aCtx) {
                aCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = aCtx.createAnalyser();
                const s = aCtx.createMediaElementSource(bgm);
                s.connect(analyser); analyser.connect(aCtx.destination);
                analyser.fftSize = 256; data = new Uint8Array(analyser.frequencyBinCount);
            }
            if(bgm.paused) { 
                bgm.play(); document.getElementById('label').innerText = "☆ SYNCED ♪";
                document.body.classList.add('is-resonating');
            } else { 
                bgm.pause(); document.getElementById('label').innerText = "☆ RESONATE ♪"; 
                document.body.classList.remove('is-resonating');
            }
        }
        document.addEventListener('mousemove', e => {
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
        });
        window.onresize = init; init(); draw();
    </script>
</body>
</html>
