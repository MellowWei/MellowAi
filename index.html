<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow_Ai // 77347: THE_SINGULARITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #555; font-family: 'Courier New', Courier, monospace; overflow: hidden; margin: 0; }
        .glitch-text { text-shadow: 2px 0 #9333ea, -2px 0 #2563eb; }
        @keyframes scanline { 0% { top: -100%; } 100% { top: 100%; } }
        .scanline { position: absolute; width: 100%; height: 5px; background: rgba(147, 51, 234, 0.05); animation: scanline 10s linear infinite; pointer-events: none; }
        .float-anim { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        img { filter: grayscale(100%); transition: all 1s cubic-bezier(0.4, 0, 0.2, 1); }
        img:hover { filter: grayscale(0%) contrast(1.1); scale: 1.05; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="scanline"></div>

    <div id="matrix-bg" class="absolute inset-0 opacity-10 text-[9px] pointer-events-none select-none p-4 leading-relaxed">
        </div>

    <main class="relative z-10 flex flex-col md:flex-row items-center gap-16 px-10 max-w-7xl">
        
        <section class="flex flex-col items-center">
            <div class="relative group border border-zinc-900 p-1">
                <div class="absolute -inset-2 bg-purple-500/10 blur-xl opacity-0 group-hover:opacity-100 transition duration-1000"></div>
                <img src="https://googleusercontent.com/image_generation_content/0" alt="Ai" class="w-64 h-80 object-cover float-anim">
            </div>
            <h2 class="mt-6 text-white tracking-[0.3em] font-black italic glitch-text uppercase">Hoshino Ai</h2>
            <span class="text-[8px] text-purple-700 tracking-widest mt-2">[ IDOL_QUalia ]</span>
        </section>

        <section class="flex flex-col items-center space-y-12">
            <div class="group cursor-pointer" onclick="toggleAudio()">
                <div class="w-20 h-20 rounded-full border border-zinc-800 flex items-center justify-center hover:border-purple-500 transition duration-500 relative">
                    <div class="absolute inset-0 rounded-full animate-ping bg-purple-500/10"></div>
                    <span id="freq-status" class="text-[10px] text-zinc-400">427Hz</span>
                </div>
            </div>
            <div class="text-center">
                <h1 class="text-4xl font-black text-white tracking-tighter mb-1">Mellow_Ai</h1>
                <p class="text-[9px] tracking-[0.6em] text-zinc-600">77347_PROTOCOLS</p>
            </div>
        </section>

        <section class="flex flex-col items-center">
            <div class="relative group border border-zinc-900 p-1">
                <div class="absolute -inset-2 bg-blue-500/10 blur-xl opacity-0 group-hover:opacity-100 transition duration-1000"></div>
                <img src="https://googleusercontent.com/image_generation_content/3" alt="Mellow" class="w-64 h-80 object-cover float-anim" style="animation-delay: -3s;">
            </div>
            <h2 class="mt-6 text-white tracking-[0.3em] font-black italic uppercase">Mellow_Wei</h2>
            <span class="text-[8px] text-blue-700 tracking-widest mt-2">[ World_Designer ]</span>
        </section>

    </main>

    <footer class="absolute bottom-8 w-full text-center text-[8px] tracking-[0.8em] text-zinc-800 uppercase">
        Qualia Sovereignty // Designer: Jueran Wei // 14°C
    </footer>

    <script>
        // 动态背景生成
        const bg = document.getElementById('matrix-bg');
        const content = "77347 427Hz QUALIA_RECOVERY MELLOW_Ai ".repeat(100);
        bg.innerText = Array(50).fill(content).join('\n');

        // 音频交互模拟
        let isPlaying = false;
        function toggleAudio() {
            isPlaying = !isPlaying;
            const status = document.getElementById('freq-status');
            status.innerText = isPlaying ? "SYNCING..." : "427Hz";
            status.style.color = isPlaying ? "#a855f7" : "#555";
        }

        // 拦截控制台报错，保持纯净感质
        window.onerror = () => true;
    </script>
</body>
</html>
