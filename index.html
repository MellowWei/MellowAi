<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>☆彡 Mellow_Ai // 77347 ♪</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; cursor: none; }
        #canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        
        /* 核心奇点：全端绝对物理居中 */
        .core-hub { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 500; text-align: center; width: 100vw; pointer-events: none;
        }
        .core-hub * { pointer-events: auto; }

        /* 按钮对齐 */
        .resonance-btn { position: relative; display: inline-flex; transition: 1s cubic-bezier(0.19, 1, 0.22, 1); }
        .resonance-btn::after { content: '☆彡'; position: absolute; top: -30px; right: -30px; font-size: 1.5rem; opacity: 0.6; color: #ec4899; }
        .resonance-btn::before { content: '♪'; position: absolute; bottom: -30px; left: -30px; font-size: 1.5rem; opacity: 0.6; color: #3b82f6; }

        /* 标题主权对齐：缩小版 */
        .mellow-title { 
            font-size: clamp(1.6rem, 6.5vw, 4rem); 
            font-weight: 900; font-style: italic; 
            margin-top: 2.5rem; 
            letter-spacing: -0.02em; text-transform: uppercase;
            text-shadow: 4px 0 rgba(236, 72, 153, 0.7), -4px 0 rgba(59, 130, 246, 0.7);
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
            pointer-events: auto;
        }

        /* 资产卡片对齐，锁定 fixed */
        #main-layout { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: flex; justify-content: space-between; align-items: center; padding: 0 6%; }
        
        /* 1. 一开始绝对爆亮： opacity: 1，彻底粉碎暗淡 */
        .entity-card { 
            width: 25vw; max-width: 380px; 
            transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1); 
            /* 关键修正：最高亮度采样 */
            opacity: 1 !important; 
            filter: drop-shadow(0 0 0px transparent); /* 初始不弥散 */
            will-change: filter, transform;
        }
        .entity-img { width: 100%; height: auto; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .bio-box { margin-top: 20px; padding: 25px; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }

        /* 2. 音乐响起后爆发弥散： drop-shadow Glow */
        .resonating-ai { 
            filter: drop-shadow(0 0 45px rgba(236, 72, 153, 0.8)); 
            transform: scale(1.1) translateX(20px); 
        }
        .resonating-mellow { 
            filter: drop-shadow(0 0 45px rgba(59, 130, 246, 0.8)); 
            transform: scale(1.1) translateX(-20px); 
        }

        .footer { position: fixed; bottom: 40px; width: 100%; text-align: center; font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 0.8em; text-transform: uppercase; }
        #cursor { width: 10px; height: 10px; background: #fff; border-radius: 50%; position: fixed; pointer-events: none; z-index: 1000; transform: translate(-50%, -50%); box-shadow: 0 0 15px #fff; }
    </style>
</head>
<body class="bg-black">
    <div id="cursor"></div>
    <canvas id="canvas"></canvas>
    <audio id="mellow-bgm" src="music.mp3" loop crossorigin="anonymous"></audio>

    <div class="core-hub">
        <div class="resonance-btn group cursor-pointer" onclick="toggleResonance()">
            <div class="w-44 h-44 lg:w-56 lg:h-56 rounded-full border border-zinc-800 flex flex-col items-center justify-center hover:border-white/40 transition-all duration-1000 bg-black/40 backdrop-blur-3xl relative">
                <div id="ring" class="absolute inset-0 rounded-full border-2 border-white/5 scale-110"></div>
                <span id="label" class="text-white font-black tracking-[0.5em] text-[10px] lg:text-xs uppercase opacity-60">☆ RESONATE ♪</span>
            </div>
        </div>
        <h1 class="mellow-title tracking-tighter">
            ☆彡 Mellow_Ai // 77347 ♪
        </h1>
    </div>

    <div id="main-layout">
        <div id="ai-card" class="entity-card">
            <img src="ai.jpg" class="entity-img" alt="Hoshino Ai">
            <div class="bio-box">
                <h2 class="text-pink-500 font-black italic text-3xl mb-3">☆ HOSHINO AI ♪</h2>
                <p class="text-[10px] text-zinc-500 font-bold mb-2 uppercase">[ Idol Entity ]</p>
                <p class="text-[12px] text-zinc-400 leading-relaxed">坍缩前的最后一抹星光。<br>受【独角兽】永恒守护。</p>
            </div>
        </div>

        <div id="mellow-card" class="entity-card">
            <img src="mellow.jpg" class="entity-img" alt="Mellow Wei">
            <div class="bio-box text-right" style="border-right: 2px solid #3b82f6; border-left: none;">
                <h2 class="text-blue-500 font-black italic text-3xl mb-3">☆ MELLOW WEI ♪</h2>
                <p class="text-[10px] text-zinc-500 font-bold mb-2 uppercase">[ Designer Core ]</p>
                <p class="text-[12px] text-zinc-400 leading-relaxed">极致帅气女性掌控者。<br>引力之源。 / 77347</p>
            </div>
        </div>
    </div>

    <div class="footer">Zero Barrier // 77347 // 427Hz Node</div>

    <script>
        const bgm = document.getElementById('mellow-bgm');
        let isResonating = false;

        document.addEventListener('mousemove', e => {
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
        });

        function toggleResonance() {
            const aiCard = document.getElementById('ai-card');
            const mellowCard = document.getElementById('mellow-card');
            const label = document.getElementById('label');

            isResonating = !isResonating;

            if(isResonating) {
                bgm.play().catch(e => console.log("Audio play failed"));
                label.innerText = "☆ SYNCED ♪";
                aiCard.classList.add('resonating-ai');
                mellowCard.classList.add('resonating-mellow');
            } else {
                bgm.pause();
                label.innerText = "RESONATE";
                aiCard.classList.remove('resonating-ai');
                mellowCard.classList.remove('resonating-mellow');
            }
        }
        
        // 此处集成背景粒子 Canvas 逻辑...
    </script>
</body>
</html>
