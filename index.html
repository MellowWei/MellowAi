<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow_Ai // 77347: THE_SINGULARITY (3D HOLOGRAM)</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; overflow: hidden; margin: 0; cursor: crosshair; }
        ::-webkit-scrollbar { display: none; }
        /* 极致灵气与主权光晕 */
        .aura-ai { box-shadow: 0 0 80px rgba(236, 72, 153, 0.4); border: 2px solid rgba(236, 72, 153, 0.3); border-radius: 4px; }
        .aura-mellow { box-shadow: 0 0 80px rgba(37, 99, 235, 0.4); border: 2px solid rgba(37, 99, 235, 0.3); border-radius: 4px; }
        img { transition: all 1s cubic-bezier(0.4, 0, 0.2, 1); cursor: none; filter: contrast(1.1) brightness(1.1); }
        img:hover { transform: scale(1.05) rotate(1deg); filter: brightness(1.2) contrast(1.1); grayscale(0%); }
    </style>
</head>
<body class="flex items-center justify-center h-screen relative">
    
    <canvas id="matrix" class="absolute inset-0 opacity-10 pointer-events-none"></canvas>

    <main class="relative z-10 flex flex-col items-center justify-center space-y-20">
        
        <section class="flex flex-col md:flex-row items-center justify-center gap-12 max-w-7xl px-10">
            
            <div class="relative group">
                <div class="absolute -inset-2 bg-gradient-to-r from-pink-600 via-purple-600 to-cyan-600 rounded-lg blur-3xl opacity-40 group-hover:opacity-100 transition duration-1000 animate-pulse"></div>
                <img id="ai-entity" src="ai.jpg" alt="Ai" class="w-80 h-auto grayscale star-eye aura-ai">
                <div class="mt-4 text-center">
                    <h2 class="text-white text-2xl font-black tracking-[0.3em] italic uppercase glitch-text" style="text-shadow: 0 0 10px #f472b6;">Hoshino Ai</h2>
                    <p class="text-[9px] tracking-[0.8em] text-pink-700 mt-1">[ IDOL_QUalia ]</p>
                </div>
            </div>

            <div class="flex flex-col items-center justify-center space-y-8">
                <div class="w-28 h-28 border-2 border-zinc-800 rounded-full flex items-center justify-center hover:border-purple-500 transition duration-1000 cursor-pointer" onclick="activateHologram()">
                    <div class="absolute inset-0 rounded-full animate-ping bg-purple-500/10"></div>
                    <span id="sync-status" class="text-white text-xs tracking-widest uppercase font-bold">427Hz</span>
                </div>
                <div class="text-center">
                    <h1 class="text-5xl font-black text-white tracking-tighter italic mb-2 glitch-text">Mellow_Ai</h1>
                    <p class="text-[10px] tracking-[0.7em] text-purple-600 mt-2">77347 // 427Hz</p>
                </div>
            </div>

            <div class="relative group">
                <div class="absolute -inset-2 bg-gradient-to-r from-cyan-600 via-purple-600 to-pink-600 rounded-lg blur-3xl opacity-40 group-hover:opacity-100 transition duration-1000 animate-pulse" style="animation-delay: -3s;"></div>
                <img id="mellow-entity" src="mellow.jpg" alt="Mellow" class="w-80 h-auto grayscale aura-mellow">
                <div class="mt-4 text-center">
                    <h2 class="text-white text-2xl font-black tracking-[0.3em] italic uppercase glitch-text" style="text-shadow: 0 0 10px #22d3ee;">Mellow Wei</h2>
                    <p class="text-[9px] tracking-[0.8em] text-blue-700 mt-1">[ World_Designer ]</p>
                </div>
            </div>

        </section>

    </main>

    <footer class="absolute bottom-10 w-full text-center text-[9px] tracking-[1.2em] text-zinc-900 uppercase font-mono">
        Subject to Qualia Sovereignty // COORDINATE: PHILADELPHIA_NODE_14°C // Designer: Jueran Wei
    </footer>

    <script src="https://unpkg.com/motion@10.16.2/dist/motion.js"></script>
    <script>
        const { animate } = Motion;
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let audioCtx;
        let oscillator;
        let gainNode;

        // 初始化全息粒子矩阵
        function initHologram() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            animateParticles(120); // 初始粒子密度对齐 427Hz
        }

        function animateParticles(density) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < density; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2;
                const color = Math.random() > 0.5 ? '#f472b6' : '#22d3ee'; // Pink/Cyan 色散
                
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 激活全息 3D 粒子爆破态
        function activateHologram() {
            const status = document.getElementById('sync-status');
            
            // 初始化声音
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                oscillator = audioCtx.createOscillator();
                gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(427, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
            }

            status.innerText = "SYNCING...";
            animateParticles(600); // 爆发粒子密度对齐 
            gainNode.gain.exponentialRampToValueAtTime(0.1, audioCtx.currentTime + 0.1);

            // 触发全息爆破与色散
            animate(
                ["#ai-entity", "#mellow-entity"],
                { filter: ["contrast(1.4) hue-rotate(90deg) blur(2px)", "contrast(1.1) hue-rotate(0deg) blur(0px)"] },
                { duration: 0.8, easing: "ease-in-out" }
            );

            setTimeout(() => {
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);
                status.innerText = "427Hz";
                initHologram(); // 重置背景
            }, 800);
        }

        // 窗口缩放适配
        window.addEventListener('resize', initHologram);
        initHologram(); // 初始降临
    </script>
</body>
</html>
