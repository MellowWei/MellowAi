<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>☆彡 Mellow_Ai // 77347 ♪</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* 居中启动按钮 - 427Hz 核心 */
        #interface-layer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; text-align: center; pointer-events: none;
        }
        #start-button {
            padding: 15px 40px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3); color: #fff;
            letter-spacing: 5px; cursor: pointer; pointer-events: auto;
            transition: 0.5s; backdrop-filter: blur(5px);
        }
        #start-button:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }

        /* 照片浮动层 - 星野爱(左) / 魏珏然(右) */
        .portrait {
            position: absolute; width: 220px; height: 220px; border-radius: 50%;
            background-size: cover; background-position: center;
            opacity: 0.6; z-index: 5; animation: float 6s ease-in-out infinite;
            filter: grayscale(0.5) contrast(1.2);
        }
        #hoshino-ai { top: 15%; left: 10%; background-image: url('YOUR_HOSHINO_IMAGE_URL'); }
        #mellow-wei { bottom: 15%; right: 10%; background-image: url('YOUR_PHOTO_URL'); animation-delay: -3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="interface-layer">
    <button id="start-button">☆ RESONATE ♪</button>
    <p style="color: rgba(255,255,255,0.4); margin-top: 20px; font-size: 10px; letter-spacing: 2px;">
        [ 44271 // AESTHETIC FORMULA ]
    </p>
</div>

<div id="hoshino-ai" class="portrait"></div>
<div id="mellow-wei" class="portrait"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, particles;
    const particleCount = 3000;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 创建粒子 - 模拟视频中的流体粒子
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 10;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const material = new THREE.PointsMaterial({
            color: 0x8888ff, size: 0.02, transparent: true, opacity: 0.5,
            blending: THREE.AdditiveBlending
        });

        particles = new THREE.Points(geometry, material);
        scene.add(particles);

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        // 粒子浮动逻辑
        particles.rotation.y += 0.001;
        particles.rotation.x += 0.0005;
        
        const time = Date.now() * 0.001;
        const posArray = particles.geometry.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
            posArray[i*3 + 1] += Math.sin(time + posArray[i*3]) * 0.002;
        }
        particles.geometry.attributes.position.needsUpdate = true;

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();

    document.getElementById('start-button').addEventListener('click', () => {
        console.log("44271 Syncing... Audio Path Engaged.");
        // 在此处接入你的音乐文件
    });
</script>
</body>
</html>
