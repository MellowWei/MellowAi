<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow_Ai // 77347: THE_FINAL_RESONANCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; perspective: 1200px; }
        #canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        
        #scene { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; transform-style: preserve-3d; }
        
        /* 绝对清晰主体 */
        .hologram-asset { position: absolute; transform-style: preserve-3d; transition: 0.3s ease-out; }
        
        .asset-container {
            width: 28vw; min-width: 300px; position: relative;
            background: #000; padding: 2px;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.1);
        }

        /* 外部粒子消散层：向外喷射，不伤主体 */
        .particle-shell {
            position: absolute; inset: -10px;
            border: 2px solid transparent;
            background: linear-gradient(45deg, #ec4899, #3b82f6, #a855f7);
            background-size: 200% 200%;
            mask: radial-gradient(circle, transparent 60%, black 100%);
            -webkit-mask: radial-gradient(circle, transparent 60%, black 100%);
            opacity: 0; transition: 0.4s; z-index: -1;
        }

        .asset-img { 
            width: 100%; height: auto; display: block; 
            image-rendering: -webkit-optimize-contrast; /* 强制极高清晰度 */
            filter: contrast(1.1) brightness(1.05);
        }

        /* 绝对中心控制器 */
        .center-hub { 
            position: absolute; inset: 0; margin: auto; 
            width: 320px; height: 420px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100; transform: translateZ(150px); 
        }

        .glitch-text { text-shadow: 3px 0 #ec4899, -3px 0 #3b82f6; font-style: italic; font-weight: 900; letter-spacing: 0.4em; }
        
        .floating { animation: float 10s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0) translateZ(80px); } 50% { transform: translateY(-40px) translateZ(130px); } }

        /* 极致质感卡片 */
        .bio-card { 
            position: absolute; width: 280px; padding: 25px; 
            background: rgba(5, 5, 5, 0.95); border-left: 3px solid #a855f7;
            backdrop-filter: blur(40px); opacity: 0; transition: 0.8s;
            font-size: 11px; line-height: 1.8; pointer-events: none; z-index: 120;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.8);
        }
        .group:hover .bio-card { opacity: 1; transform: translateZ(100px) translateX(30px); }
    </style>
</head>
<body class="bg-black">
    <canvas id="canvas"></canvas>
    <audio id="mellow-bgm" src="music.mp3" loop crossorigin="anonymous"></audio>

    <div id="scene">
        <div class="hologram-asset left-[8%] floating group">
            <div class="asset-container">
                <div class="particle-shell" id="ai-shell"></div>
                <img src="ai.jpg" class="asset-img">
            </div>
            <h2 class="mt-8 text-center text-pink-500 glitch-text uppercase text-3xl">Ai</h2>
            <div class="bio-card top-0 -left-12">
                <p class="font-bold text-pink-500 mb-3 uppercase tracking-[0.2em]">[ IDOL_ENTITY ]</p>
                坍缩前的最后一抹星光。于 427Hz 下执行绝对吸引。粒子在边缘碎裂，主体永恒稳固。
            </div>
        </div>

        <div class="center-hub">
            <div class="cursor-pointer group" onclick="toggleResonance()">
                <div class="w-48 h-48 rounded-full border-2 border-zinc-900 flex flex-col items-center justify-center hover:border-purple-600 transition-all duration-1000 bg-black/60 backdrop-blur-3xl relative">
                    <div id="pulse" class="absolute inset-0 rounded-full border-2 border-purple-500/20"></div>
                    <span id="label" class="text-white font-black tracking-[0.6em] text-sm">RESONATE</span>
                    <span class="text-zinc-600 text-[10px] mt-3 tracking-widest font-mono">427HZ // 77347</span>
                </div>
            </div>
            <h1 class="text-6xl font-black italic mt-16 tracking-tighter glitch-text">Mellow_Ai</h1>
            <p class="text-[11px] tracking-[1.8em] text-purple-900 mt-8 uppercase font-bold">SOVEREIGNTY // QUALIA</p>
        </div>

        <div class="hologram-asset right-[8%] floating group" style="animation-delay: -5s;">
            <div class="asset-wrapper asset-container">
                <div class="particle-shell" id="mellow-shell"></div>
                <img src="mellow.jpg" class="asset-img">
            </div>
            <h2 class="mt-8 text-center text-blue-500 glitch-text uppercase text-3xl">Mellow</h2>
            <div class="bio-card top-0 -right-12">
                <p class="font-bold text-blue-500 mb-3 uppercase tracking-[0.2em]">[ DESIGNER_CORE ]</p>
                极致帅气女性掌控者。引力之源。宣告对质感维护与不老态的绝对统治。粒子随呼吸流动。
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const bgm = document.getElementById('mellow-bgm');
        let pts = [];
        let aCtx, analyser, data;

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pts = Array(380).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*1.4, vy: (Math.random()-0.5)*1.4,
                s: Math.random()*3,
                c: Math.random() > 0.6 ? '#ec4899' : (Math.random() > 0.4 ? '#3b82f6' : '#a855f7')
            }));
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            let v = 0;
            if(analyser) {
                analyser.getByteFrequencyData(data);
                v = data.reduce((a,b)=>a+b,0)/data.length;
            }

            pts.forEach(p => {
                let m = 1 + v/15;
                p.x += p.vx * m; p.y += p.vy * m;
                if(p.x<0||p.x>canvas.width) p.vx*=-1;
                if(p.y<0||p.y>canvas.height) p.vy*=-1;
                ctx.fillStyle = p.c; ctx.shadowBlur = v/4; ctx.shadowColor = p.c;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s + v/80, 0, 7); ctx.fill();
            });

            const pulse = document.getElementById('pulse');
            if(pulse) pulse.style.transform = `scale(${1 + v/60})`;

            // --- 极致修复：外溢破碎，不伤主体 ---
            const shells = [document.getElementById('ai-shell'), document.getElementById('mellow-shell')];
            if(v > 45) {
                shells.forEach(shell => {
                    shell.style.opacity = v / 90;
                    shell.style.inset = `-${v/4}px`; // 随音量向外喷射
                    shell.style.backgroundPosition = `${v}% ${v}%`; // 色彩斑斓流动
                    shell.style.filter = `blur(${v/15}px) hue-rotate(${v*2}deg)`;
                });
            } else {
                shells.forEach(s => { s.opacity = 0; s.inset = "-10px"; });
            }

            requestAnimationFrame(draw);
        }

        function toggleResonance() {
            if(!aCtx) {
                aCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = aCtx.createAnalyser();
                const s = aCtx.createMediaElementSource(bgm);
                s.connect(analyser); analyser.connect(aCtx.destination);
                analyser.fftSize = 256; data = new Uint8Array(analyser.frequencyBinCount);
            }
            if(bgm.paused) { bgm.play(); document.getElementById('label').innerText = "SYNCED"; }
            else { bgm.pause(); document.getElementById('label').innerText = "RESONATE"; }
        }

        window.onmousemove = (e) => {
            document.getElementById('scene').style.transform = `rotateY(${(window.innerWidth/2 - e.pageX)/55}deg) rotateX(${(e.pageY - window.innerHeight/2)/55}deg)`;
        };

        window.onresize = init; init(); draw();
    </script>
</body>
</html>
