<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow_Ai // 77347: AUDIO_REACTIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; perspective: 1200px; }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #scene { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; transform-style: preserve-3d; }
        
        /* 核心按钮：绝对居中 */
        .core-interface { position: absolute; z-index: 100; text-align: center; }
        
        .hologram-asset { 
            position: absolute; transform-style: preserve-3d; transition: all 0.8s ease;
            filter: drop-shadow(0 0 30px rgba(168, 85, 247, 0.4));
        }
        .asset-img { width: 22vw; min-width: 200px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); transition: 0.5s; }

        .glitch-text { text-shadow: 2px 0 #ec4899, -2px 0 #3b82f6; font-style: italic; font-weight: 900; }
        
        /* 浮动与消散动画 */
        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0) translateZ(50px); } 50% { transform: translateY(-20px) translateZ(100px); } }
    </style>
</head>
<body class="bg-black">
    <canvas id="canvas"></canvas>
    <audio id="mellow-bgm" src="music.mp3" loop crossorigin="anonymous"></audio>

    <div id="scene">
        <div id="ai-node" class="hologram-asset left-[10%] floating">
            <img src="ai.jpg" class="asset-img opacity-80">
            <h2 class="mt-4 text-center text-pink-500 glitch-text tracking-widest uppercase">Ai</h2>
        </div>

        <div class="core-interface">
            <div class="cursor-pointer group" onclick="initAudioAndResonate()">
                <div class="w-40 h-40 rounded-full border-2 border-zinc-800 flex flex-col items-center justify-center hover:border-purple-500 transition-all duration-1000 relative bg-black/40 backdrop-blur-md">
                    <div id="pulse-ring" class="absolute inset-0 rounded-full border border-purple-500/30"></div>
                    <span id="btn-status" class="text-[12px] tracking-[0.4em] text-white uppercase font-bold">Resonate</span>
                    <span class="text-[8px] tracking-[0.2em] text-zinc-500 mt-2">427 HZ</span>
                </div>
            </div>
            <h1 class="text-4xl font-black italic mt-12 tracking-tighter glitch-text">Mellow_Ai</h1>
        </div>

        <div id="mellow-node" class="hologram-asset right-[10%] floating" style="animation-delay: -3s;">
            <img src="mellow.jpg" class="asset-img opacity-80">
            <h2 class="mt-4 text-center text-blue-500 glitch-text tracking-widest uppercase">Mellow</h2>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const bgm = document.getElementById('mellow-bgm');
        let pts = [];
        let audioCtx, analyser, dataArray;

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pts = Array(300).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*1.5, vy: (Math.random()-0.5)*1.5,
                s: Math.random()*2, baseS: Math.random()*2,
                c: Math.random() > 0.5 ? '#ec4899' : '#3b82f6'
            }));
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            let volume = 0;
            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                volume = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
            }

            pts.forEach(p => {
                // 粒子受音乐节奏驱动：速度与大小随音量变化
                const speedMult = 1 + (volume / 20);
                p.x += p.vx * speedMult; p.y += p.vy * speedMult;
                p.s = p.baseS + (volume / 40);

                if(p.x<0||p.x>canvas.width) p.vx *= -1;
                if(p.y<0||p.y>canvas.height) p.vy *= -1;

                ctx.shadowBlur = volume / 5; ctx.shadowColor = p.c;
                ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
            });

            // 按钮光环同步
            const ring = document.getElementById('pulse-ring');
            if(ring) ring.style.transform = `scale(${1 + volume/100})`;

            // 形象透明度随音乐消散感
            if (volume > 50) {
                document.querySelectorAll('.asset-img').forEach(img => {
                    img.style.opacity = 0.3 + (100 - volume) / 150;
                    img.style.filter = `blur(${volume/20}px) brightness(${1 + volume/100})`;
                });
            }

            requestAnimationFrame(draw);
        }

        function initAudioAndResonate() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaElementSource(bgm);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }

            if (bgm.paused) {
                bgm.play();
                document.getElementById('btn-status').innerText = "Resonating";
            } else {
                bgm.pause();
                document.getElementById('btn-status').innerText = "Paused";
            }
        }

        // 3D 视角与手势
        window.onmousemove = (e) => {
            const rY = (window.innerWidth/2 - e.pageX) / 40;
            const rX = (e.pageY - window.innerHeight/2) / 40;
            document.getElementById('scene').style.transform = `rotateY(${rY}deg) rotateX(${rX}deg)`;
        };

        window.onresize = init; init(); draw();
    </script>
</body>
</html>
