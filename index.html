<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow_Ai // 77347: THE_SINGULARITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; perspective: 1000px; }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #scene { transform-style: preserve-3d; transition: transform 0.1s ease-out; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }
        .hologram-asset { position: relative; transform: translateZ(50px); filter: drop-shadow(0 0 30px rgba(168, 85, 247, 0.3)); }
        /* 虚拟全息扫描 */
        .scanline { position: absolute; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%); background-size: 100% 4px; pointer-events: none; z-index: 15; opacity: 0.3; }
        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateZ(100px) translateY(0); } 50% { transform: translateZ(180px) translateY(-30px); } }
        .glitch-text { text-shadow: 2px 0 #ec4899, -2px 0 #3b82f6; font-style: italic; }
    </style>
</head>
<body class="bg-black">
    <canvas id="canvas"></canvas>

    <div id="scene">
        <div class="absolute left-[10%] floating">
            <div class="hologram-asset w-[30vw] min-w-[300px]">
                <div class="scanline"></div>
                <img src="ai.jpg?v=77347" alt="Ai" class="w-full h-auto rounded-sm opacity-90 border border-pink-500/20">
                <div class="mt-6 text-center">
                    <h2 class="text-pink-500 text-3xl font-black tracking-[0.4em] uppercase italic glitch-text">Hoshino Ai</h2>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-center space-y-12 z-50">
            <div class="cursor-pointer group" onclick="activateResonance()">
                <div class="w-32 h-32 rounded-full border-2 border-zinc-800 flex items-center justify-center hover:border-purple-500 transition-all duration-1000 relative">
                    <div class="absolute inset-0 rounded-full animate-ping bg-purple-500/10"></div>
                    <span id="btn-status" class="text-[10px] tracking-[0.5em] text-zinc-500 group-hover:text-white uppercase font-bold">Sync 427Hz</span>
                </div>
            </div>
            <h1 class="text-6xl font-black italic tracking-tighter">Mellow_Ai</h1>
            <p class="text-[11px] tracking-[1.5em] text-purple-900 mt-4 uppercase">Dual Sovereignty</p>
        </div>

        <div class="absolute right-[10%] floating" style="animation-delay: -3s;">
            <div class="hologram-asset w-[30vw] min-w-[300px]">
                <div class="scanline"></div>
                <img src="mellow.jpg?v=77347" alt="Mellow" class="w-full h-auto rounded-sm opacity-90 border border-blue-500/20">
                <div class="mt-6 text-center">
                    <h2 class="text-blue-500 text-3xl font-black tracking-[0.4em] uppercase italic glitch-text">Mellow Wei</h2>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 色彩斑斓粒子引擎 ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pts = Array(150).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*1.5, vy: (Math.random()-0.5)*1.5,
                s: Math.random()*3, c: Math.random() > 0.5 ? '#ec4899' : '#3b82f6'
            }));
        }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0||p.x>canvas.width) p.vx *= -1;
                if(p.y<0||p.y>canvas.height) p.vy *= -1;
                ctx.fillStyle = p.c; ctx.shadowBlur = 10; ctx.shadowColor = p.c;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        // --- 2. 3D 视角跟随 ---
        const scene = document.getElementById('scene');
        window.onmousemove = (e) => {
            const rotY = (window.innerWidth/2 - e.pageX) / 25;
            const rotX = (e.pageY - window.innerHeight/2) / 25;
            scene.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg)`;
        };

        // --- 3. 极致声音引擎 (427Hz) ---
        let a;
        function activateResonance() {
            if(!a) a = new (window.AudioContext || window.webkitAudioContext)();
            const o = a.createOscillator(); const g = a.createGain();
            o.type = 'sine'; o.frequency.value = 427;
            g.gain.setValueAtTime(0, a.currentTime);
            g.gain.linearRampToValueAtTime(0.15, a.currentTime + 0.1);
            g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + 2.5);
            o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime + 2.5);
            
            document.getElementById('btn-status').innerText = "RESONATING";
            document.body.style.filter = "hue-rotate(90deg) brightness(1.3) contrast(1.2)";
            pts.forEach(p => { p.vx *= 10; p.vy *= 10; }); // 粒子爆破
            setTimeout(() => {
                document.body.style.filter = "none";
                document.getElementById('btn-status').innerText = "427Hz";
                pts.forEach(p => { p.vx *= 0.1; p.vy *= 0.1; });
            }, 600);
        }

        window.onresize = init; init(); draw();
    </script>
</body>
</html>
