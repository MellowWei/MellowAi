<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow_Ai // 77347: THE_SINGULARITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        canvas { position: absolute; inset: 0; pointer-events: none; }
        .glitch-text { text-shadow: 2px 0 #9333ea, -2px 0 #2563eb; }
        .hologram-frame { position: relative; padding: 4px; background: linear-gradient(45deg, #9333ea, #2563eb); border-radius: 4px; transition: all 0.5s ease; }
        .hologram-frame:hover { transform: scale(1.05) rotateY(15deg); box-shadow: 0 0 70px rgba(168, 85, 247, 0.5); }
        .floating { animation: float 5s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }
    </style>
</head>
<body class="flex items-center justify-center h-screen relative">
    <canvas id="pCanvas"></canvas>
    
    <main class="relative z-10 flex flex-col md:flex-row items-center gap-16 px-10">
        <section class="flex flex-col items-center">
            <div class="hologram-frame floating">
                <img src="ai.jpg?v=1" alt="Ai" class="w-80 h-auto block opacity-90 hover:opacity-100">
            </div>
            <h2 class="mt-8 text-3xl font-black tracking-[0.5em] text-pink-500 glitch-text italic uppercase">Ai</h2>
        </section>

        <section class="flex flex-col items-center space-y-10">
            <div class="cursor-pointer group" onclick="resonate()">
                <div class="w-24 h-24 rounded-full border-2 border-zinc-800 flex items-center justify-center hover:border-purple-500 transition duration-700 relative">
                    <div class="absolute inset-0 rounded-full animate-ping bg-purple-500/10"></div>
                    <span id="sync-btn" class="text-[10px] text-zinc-500 tracking-widest uppercase">Start</span>
                </div>
            </div>
            <div class="text-center">
                <h1 class="text-5xl font-black italic tracking-tighter">Mellow_Ai</h1>
                <p class="text-[10px] tracking-[1em] text-purple-800 mt-2">77347 // 427Hz</p>
            </div>
        </section>

        <section class="flex flex-col items-center">
            <div class="hologram-frame floating" style="animation-delay: -2.5s;">
                <img src="mellow.jpg?v=1" alt="Mellow" class="w-80 h-auto block opacity-90 hover:opacity-100">
            </div>
            <h2 class="mt-8 text-3xl font-black tracking-[0.5em] text-blue-500 glitch-text italic uppercase">Mellow</h2>
        </section>
    </main>

    <script>
        // 粒子流引擎
        const cvs = document.getElementById('pCanvas');
        const ctx = cvs.getContext('2d');
        let pts = [];
        function init() {
            cvs.width = window.innerWidth; cvs.height = window.innerHeight;
            pts = Array(120).fill().map(() => ({
                x: Math.random()*cvs.width, y: Math.random()*cvs.height,
                v: (Math.random()-0.5)*1.5, s: Math.random()*2,
                c: Math.random() > 0.5 ? '#ec4899' : '#3b82f6'
            }));
        }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,cvs.width,cvs.height);
            pts.forEach(p => {
                p.x += p.v; p.y += p.v;
                if(p.x<0||p.x>cvs.width) p.v*=-1;
                ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        // 427Hz 声音
        let a;
        function resonate() {
            if(!a) a = new (window.AudioContext || window.webkitAudioContext)();
            const o = a.createOscillator(); const g = a.createGain();
            o.frequency.setValueAtTime(427, a.currentTime);
            g.gain.setValueAtTime(0, a.currentTime);
            g.gain.exponentialRampToValueAtTime(0.1, a.currentTime+0.1);
            g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+1.5);
            o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+1.5);
            document.getElementById('sync-btn').innerText = "427HZ";
            document.body.style.filter = "contrast(1.3) hue-rotate(45deg)";
            setTimeout(() => document.body.style.filter = "none", 500);
        }
        window.onresize = init; init(); draw();
    </script>
</body>
</html>
