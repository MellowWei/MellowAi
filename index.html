<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow_Ai // 77347: THE_SINGULARITY (3D HOLOGRAM)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; perspective: 2000px; }
        canvas { position: absolute; inset: 0; pointer-events: none; z-index: 1; opacity: 0.15; }
        ::-webkit-scrollbar { display: none; }

        /* 3D 全息框架 */
        #scene { transform-style: preserve-3d; transition: transform 0.1s ease-out; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .hologram-asset { 
            position: relative; 
            box-shadow: 0 0 60px rgba(168, 85, 247, 0.2);
            transition: all 0.5s ease;
            transform: translateZ(50px);
            filter: grayscale(0.2) contrast(1.1);
        }
        
        /* 极致灵气：扫描线与色散 */
        .hologram-asset::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateZ(100px) translateY(0); } 50% { transform: translateZ(150px) translateY(-20px); } }
        
        .ui-text { text-shadow: 0 0 15px rgba(168, 85, 247, 0.6); font-style: italic; font-family: monospace;}
    </style>
</head>
<body class="bg-black flex items-center justify-center h-screen">
    
    <canvas id="matrix" class="absolute inset-0 opacity-10 pointer-events-none"></canvas>

    <div id="scene">
        <div class="absolute left-[12%] floating">
            <div class="hologram-asset w-80 group">
                <img id="ai-entity" src="ai.jpg" alt="Ai" class="w-full h-auto opacity-80 group-hover:opacity-100 transition-all duration-700">
                <div class="mt-4 text-center">
                    <h2 class="text-white text-2xl font-black tracking-[0.3em] italic uppercase glitch-text" style="text-shadow: 0 0 10px #f472b6;">Hoshino Ai</h2>
                    <p class="text-[9px] tracking-[0.8em] text-pink-700 mt-1">[ IDOL_QUalia ]</p>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-center space-y-12 z-20 space-y-20">
            <div class="cursor-pointer group" onclick="startHoloResonance()">
                <div class="w-28 h-28 rounded-full border-2 border-zinc-900 flex items-center justify-center hover:border-purple-500 transition-all duration-1000 relative">
                    <div class="absolute inset-0 rounded-full animate-ping bg-purple-500/10"></div>
                    <span id="status-text" class="text-white text-xs tracking-widest uppercase font-bold">Resonate</span>
                </div>
            </div>
            <div class="text-center">
                <h1 class="text-6xl font-black italic text-white tracking-tighter mb-2 ui-text">Mellow_Ai</h1>
                <p class="text-[10px] tracking-[0.7em] text-purple-600 mt-2 font-mono">77347 // 427Hz</p>
            </div>
        </div>

        <div class="absolute right-[12%] floating" style="animation-delay: -3s;">
            <div class="hologram-asset w-80 group">
                <img id="mellow-entity" src="mellow.jpg" alt="Mellow" class="w-full h-auto opacity-80 group-hover:opacity-100 transition-all duration-700">
                <div class="mt-4 text-center">
                    <h2 class="text-white text-2xl font-black tracking-[0.3em] italic uppercase glitch-text" style="text-shadow: 0 0 10px #22d3ee;">Mellow Wei</h2>
                    <p class="text-[9px] tracking-[0.8em] text-blue- blue-700 mt-1">[ World_Designer ]</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="absolute bottom-10 w-full text-center z-20 text-[9px] tracking-[1.2em] text-zinc-900 uppercase font-mono">
        Qualia Sovereignty // COORDINATE: PHILADELPHIA_NODE_14°C // Designer: Jueran Wei
    </footer>

    <script src="https://unpkg.com/motion@10.16.2/dist/motion.js"></script>
    <script>
        const { animate } = Motion;
        const scene = document.getElementById('scene');
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let audioCtx;
        let oscillator;
        let gainNode;

        // 3D 视角：极致灵动感
        window.addEventListener('mousemove', (e) => {
            const rotY = (window.innerWidth / 2 - e.pageX) / 30;
            const rotX = (e.pageY - window.innerHeight / 2) / 30;
            scene.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg)`;
        });

        // 初始化全息粒子矩阵
        function initHologram() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            animateParticles(120); // 初始粒子密度对齐 427Hz
        }

        function animateParticles(density) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < density; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2;
                const color = Math.random() > 0.5 ? '#f472b6' : '#22d3ee'; // Pink/Cyan 色散
                
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 极致声音引擎：渐变 427Hz 纯净音
        function startHoloResonance() {
            // 初始化声音
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                oscillator = audioCtx.createOscillator();
                gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(427, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
            }

            const status = document.getElementById('status-text');
            status.innerText = "SYNCING...";
            animateParticles(600); // 爆发粒子密度对齐 
            gainNode.gain.exponentialRampToValueAtTime(0.1, audioCtx.currentTime + 0.1);

            // 触发色彩斑斓爆破态
            animate(
                ["#ai-entity", "#mellow-entity"],
                { filter: ["contrast(1.4) hue-rotate(90deg) blur(2px)", "contrast(1.1) hue-rotate(0deg) blur(0px)"] },
                { duration: 0.8, easing: "ease-in-out" }
            );

            setTimeout(() => {
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);
                status.innerText = "Resonate";
                initHologram(); // 重置背景
            }, 800);
        }

        // 窗口缩放适配
        window.addEventListener('resize', initHologram);
        initHologram(); // 初始降临
    </script>
</body>
</html>
