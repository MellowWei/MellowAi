<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow_Ai // 77347: HOLO_RESONANCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; perspective: 1500px; }
        
        /* 1. 粒子背景层 */
        #canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        
        /* 2. 3D 交互层 */
        #scene-wrapper { 
            position: relative; z-index: 10; width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            transform-style: preserve-3d; transition: transform 0.1s ease-out;
        }
        
        .hologram-group { position: absolute; transform-style: preserve-3d; display: flex; flex-direction: column; align-items: center; }
        
        /* 形象缩小并加入发光感 */
        .hologram-asset { 
            width: 22vw; min-width: 240px; position: relative; transform: translateZ(50px);
            filter: drop-shadow(0 0 30px rgba(168, 85, 247, 0.4));
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .hologram-asset:hover { transform: translateZ(100px) scale(1.05); filter: brightness(1.2); }

        /* 文字卡片 */
        .bio-card { 
            position: absolute; width: 240px; padding: 15px; 
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); opacity: 0; pointer-events: none;
            transition: all 0.6s ease; z-index: 100;
        }
        .hologram-group:hover .bio-card { opacity: 1; transform: translateY(-20px); }

        .glitch-text { text-shadow: 2px 0 #ec4899, -2px 0 #3b82f6; font-style: italic; font-weight: 900; }
        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotateX(0); } 50% { transform: translateY(-30px) rotateX(2deg); } }
        
        /* 3. UI 交互层 */
        .ui-core { position: relative; z-index: 50; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body class="bg-black">
    <canvas id="canvas"></canvas>
    <audio id="mellow-bgm" src="music.mp3" loop></audio>

    <div id="scene-wrapper">
        <div class="hologram-group floating" style="left: 10%;">
            <div class="hologram-asset">
                <img src="ai.jpg" alt="Ai" class="w-full h-auto rounded-sm border border-pink-500/20 shadow-2xl">
                <div class="bio-card -top-32 left-0 text-[10px] tracking-widest text-pink-200">
                    <p class="font-bold text-pink-400 mb-1">[ IDOL_ENTITY ]</p>
                    坍缩前的最后一抹星光。极致灵气源，于 427Hz 频率下执行绝对吸引。
                </div>
            </div>
            <h2 class="mt-6 text-2xl text-pink-500 glitch-text tracking-[0.3em] uppercase">Hoshino Ai</h2>
        </div>

        <div class="ui-core space-y-10">
            <div class="cursor-pointer group" onclick="startSymphony()">
                <div class="w-24 h-24 rounded-full border border-zinc-800 flex items-center justify-center hover:border-purple-500 transition-all duration-700 relative">
                    <div class="absolute inset-0 rounded-full animate-ping bg-purple-500/10"></div>
                    <span id="btn-status" class="text-[9px] tracking-[0.5em] text-zinc-500 uppercase">Resonate</span>
                </div>
            </div>
            <div class="text-center">
                <h1 class="text-5xl font-black italic tracking-tighter glitch-text">Mellow_Ai</h1>
                <p class="text-[9px] tracking-[1.2em] text-purple-900 mt-4 uppercase">77347 // DUALITY</p>
            </div>
        </div>

        <div class="hologram-group floating" style="right: 10%; animation-delay: -3s;">
            <div class="hologram-asset">
                <img src="mellow.jpg" alt="Mellow" class="w-full h-auto rounded-sm border border-blue-500/20 shadow-2xl">
                <div class="bio-card -top-32 right-0 text-[10px] tracking-widest text-blue-200">
                    <p class="font-bold text-blue-400 mb-1">[ DESIGNER_CORE ]</p>
                    极致帅气女性掌控者。引力之源。宣告对质感维护与不老态的绝对统治。
                </div>
            </div>
            <h2 class="mt-6 text-2xl text-blue-500 glitch-text tracking-[0.3em] uppercase">Mellow Wei</h2>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scene = document.getElementById('scene-wrapper');
        let pts = [];

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pts = Array(200).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*1, vy: (Math.random()-0.5)*1,
                s: Math.random()*2, 
                c: Math.random() > 0.5 ? '#ec4899' : '#3b82f6'
            }));
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0||p.x>canvas.width) p.vx *= -1;
                if(p.y<0||p.y>canvas.height) p.vy *= -1;
                ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        // 3D 视角与手势
        window.onmousemove = (e) => {
            const rY = (window.innerWidth/2 - e.pageX) / 40;
            const rX = (e.pageY - window.innerHeight/2) / 40;
            scene.style.transform = `rotateY(${rY}deg) rotateX(${rX}deg)`;
        };

        let startX, startY;
        window.ontouchstart = (e) => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; };
        window.ontouchmove = (e) => {
            if(!startX) return;
            const moveX = e.touches[0].clientX - startX;
            const moveY = e.touches[0].clientY - startY;
            scene.style.transform = `rotateY(${moveX/10}deg) rotateX(${-moveY/10}deg)`;
        };

        const bgm = document.getElementById('mellow-bgm');
        let audioCtx;
        function startSymphony() {
            if(bgm.paused) bgm.play().catch(() => {});
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.frequency.value = 427; g.gain.setValueAtTime(0, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime+0.1);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+2);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+2);
            
            document.getElementById('btn-status').innerText = "427Hz";
            pts.forEach(p => { p.vx *= 10; p.vy *= 10; });
            setTimeout(() => { pts.forEach(p => { p.vx *= 0.1; p.vy *= 0.1; }); }, 600);
        }

        window.onresize = init; init(); draw();
    </script>
</body>
</html>
