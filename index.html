<script>
    let audioCtx;
    let oscillator;
    let gainNode;

    function activateHologram() {
        const status = document.getElementById('sync-status');
        
        // 初始化 427Hz 极致声音
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(427, audioCtx.currentTime); // 锁定 427Hz
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }

        // 触发共振：声音与视觉同步爆发
        status.innerText = "RESONATING...";
        gainNode.gain.exponentialRampToValueAtTime(0.1, audioCtx.currentTime + 0.1);
        
        // 视觉爆破
        document.body.style.filter = "brightness(1.5) contrast(1.2) hue-rotate(180deg)";
        animateParticles(800); 

        setTimeout(() => {
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);
            document.body.style.filter = "none";
            status.innerText = "427Hz";
            initHologram();
        }, 1000);
    }
</script>
