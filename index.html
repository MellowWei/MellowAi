<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow_Ai // 77347: HOLO_RESONANCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; perspective: 1200px; }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #scene { transform-style: preserve-3d; transition: transform 0.1s ease-out; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }
        
        /* 极致灵气：发光与投射反射 */
        .hologram-asset { 
            position: relative; transform: translateZ(80px); 
            filter: drop-shadow(0 0 50px rgba(168, 85, 247, 0.5));
            border-bottom: 2px solid rgba(255, 255, 255, 0.1); /* 模拟投影反射边线 */
        }
        .hologram-asset::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(236, 72, 193, 0.05), rgba(59, 130, 246, 0.05));
            background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 5;
        }

        /* 3D 浮动描述卡片 */
        .bio-card { 
            position: absolute; width: 280px; padding: 24px; 
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px); transform: translateZ(-30px);
            opacity: 0; transition: all 1s cubic-bezier(0.19, 1, 0.22, 1); pointer-events: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .group:hover .bio-card { opacity: 1; transform: translateZ(50px) translateY(-30px); }

        .glitch-text { text-shadow: 3px 0 #ec4899, -3px 0 #3b82f6; font-style: italic; }
        .floating { animation: float 7s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateZ(100px) translateY(0) rotateX(2deg); } 50% { transform: translateZ(200px) translateY(-40px) rotateX(-2deg); } }
        
        /* 地面反射感 */
        .floor-reflection {
            position: absolute; bottom: 0; width: 100%; height: 20vh;
            background: linear-gradient(to top, rgba(168, 85, 247, 0.1), transparent);
            filter: blur(40px); pointer-events: none;
        }
    </style>
</head>
<body class="bg-black">
    <canvas id="canvas"></canvas>
    <div class="floor-reflection"></div>

    <div id="scene">
        <div class="absolute left-[8%] floating group">
            <div class="hologram-asset w-[28vw] min-w-[320px]">
                <img src="ai.jpg" alt="Ai" class="w-full h-auto rounded-sm border border-pink-500/20 shadow-[0_0_80px_rgba(236,72,153,0.2)]">
                <div class="mt-8 text-center">
                    <h2 class="text-pink-500 text-4xl font-black tracking-[0.4em] uppercase italic glitch-text">Hoshino Ai</h2>
                </div>
            </div>
            <div class="bio-card top-0 -left-10">
                <p class="font-bold mb-3 text-pink-400 tracking-widest uppercase">[ IDOL_ENTITY ]</p>
                <p class="text-[11px] leading-relaxed text-pink-100/70 tracking-widest">
                    坍缩前的最后一抹星光。极致灵气源，于 427Hz 频率下执行绝对吸引。
                </p>
            </div>
        </div>

        <div class="flex flex-col items-center space-y-12 z-50">
            <div class="cursor-pointer group" onclick="startSymphony()">
                <div class="w-32 h-32 rounded-full border-2 border-zinc-800 flex items-center justify-center hover:border-purple-500 transition-all duration-1000 relative">
                    <div class="absolute inset-0 rounded-full animate-ping bg-purple-500/20"></div>
                    <span id="btn-status" class="text-[10px] tracking-[0.6em] text-zinc-400 group-hover:text-white uppercase font-bold">Resonate</span>
                </div>
            </div>
            <div class="text-center">
                <h1 class="text-7xl font-black italic tracking-tighter ui-text">Mellow_Ai</h1>
                <p class="text-[11px] tracking-[1.5em] text-purple-700 mt-6 uppercase font-mono">77347 // DUALITY</p>
            </div>
        </div>

        <div class="absolute right-[8%] floating group" style="animation-delay: -3.5s;">
            <div class="hologram-asset w-[28vw] min-w-[320px]">
                <img src="mellow.jpg" alt="Mellow" class="w-full h-auto rounded-sm border border-blue-500/20 shadow-[0_0_80px_rgba(59,130,246,0.2)]">
                <div class="mt-8 text-center">
                    <h2 class="text-blue-500 text-4xl font-black tracking-[0.4em] uppercase italic glitch-text">Mellow Wei</h2>
                </div>
            </div>
            <div class="bio-card top-0 -right-10">
                <p class="font-bold mb-3 text-blue-400 tracking-widest uppercase">[ DESIGNER_CORE ]</p>
                <p class="text-[11px] leading-relaxed text-blue-100/70 tracking-widest">
                    极致帅气女性掌控者。引力之源。宣告对质感维护与不老态的绝对统治。
                </p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let pts = [];
        
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pts = Array(250).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*1.2, vy: (Math.random()-0.5)*1.2,
                s: Math.random()*2.5, 
                // 主要色调：粉色与蓝色斑斓
                c: Math.random() > 0.6 ? '#ec4899' : (Math.random() > 0.5 ? '#3b82f6' : '#a855f7')
            }));
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0||p.x>canvas.width) p.vx *= -1;
                if(p.y<0||p.y>canvas.height) p.vy *= -1;
                ctx.fillStyle = p.c; 
                ctx.shadowBlur = 15; ctx.shadowColor = p.c;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        const scene = document.getElementById('scene');
        window.onmousemove = (e) => {
            const rotY = (window.innerWidth/2 - e.pageX) / 35;
            const rotX = (e.pageY - window.innerHeight/2) / 35;
            scene.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg)`;
        };

        // 427Hz 声音引擎
        let audio;
        function startSymphony() {
            if(!audio) audio = new (window.AudioContext || window.webkitAudioContext)();
            const o = audio.createOscillator(); const g = audio.createGain();
            o.type = 'sine'; o.frequency.value = 427;
            g.gain.setValueAtTime(0, audio.currentTime);
            g.gain.linearRampToValueAtTime(0.1, audio.currentTime + 0.2);
            g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + 3);
            o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + 3);
            
            document.getElementById('btn-status').innerText = "SYNCING";
            document.body.style.filter = "hue-rotate(30deg) brightness(1.2) contrast(1.2)";
            pts.forEach(p => { p.vx *= 12; p.vy *= 12; }); // 粒子爆发
            setTimeout(() => {
                document.body.style.filter = "none";
                document.getElementById('btn-status').innerText = "427Hz";
                pts.forEach(p => { p.vx *= 0.08; p.vy *= 0.08; });
            }, 800);
        }

        window.onresize = init; init(); draw();
    </script>
</body>
</html>
