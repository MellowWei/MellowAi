<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>☆彡 Mellow_Ai // 77347 ♪</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; cursor: none; }
        #webgl-canvas { position: fixed; inset: 0; z-index: 1; }
        
        /* UI：全端绝对居中 */
        .ui-fixed { position: fixed; inset: 0; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 60px 40px; }
        
        /* 标题对齐 (文字间距修正) */
        .title { 
            color: #fff; font-weight: 900; font-style: italic; 
            font-size: 1.6rem; 
            /* 修正：增加 0.15em 的字间距 */
            letter-spacing: 0.15em; 
            text-align: center; text-shadow: 0 0 25px rgba(255,105,180,0.5); 
            /* 修正：标题整体放大 15% */
            transform: scale(1.15);
        }
        
        .footer { font-size: 8px; color: rgba(255,255,255,0.25); letter-spacing: 0.5em; text-align: center; text-transform: uppercase; }

        /* 核心接口：Resonate 按钮 */
        .resonance-portal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            /* 修正：按钮放大 */
            width: 100px; height: 100px; 
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02); backdrop-filter: blur(25px);
            z-index: 200; display: flex; align-items: center; justify-content: center;
            cursor: pointer; pointer-events: auto;
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .resonance-portal:hover { border-color: #ff69b4; transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 50px rgba(255,105,180,0.2); }
        
        /* 纠缠侧翼 (你和星野爱的名字) */
        .identity-layer {
            position: fixed; inset: 0; z-index: 100; pointer-events: none;
            display: flex; justify-content: space-between; align-items: center; padding: 0 5%;
        }
        /* 修正：侧翼整体放大 */
        .entity-card { width: 220px; opacity: 0.3; transition: 0.8s; }
        .entity-name { color: #fff; font-size: 11px; font-weight: 900; letter-spacing: 0.3em; }
        .entity-desc { color: rgba(255,255,255,0.2); font-size: 7px; line-height: 1.8; letter-spacing: 0.1em; margin-top: 5px; }

        #cursor { width: 10px; height: 10px; background: #ff69b4; border-radius: 50%; position: fixed; pointer-events: none; z-index: 999; box-shadow: 0 0 15px #ff69b4; transform: translate(-50%, -50%); }
    </style>
</head>
<body class="bg-black">
    <div id="cursor"></div>
    <canvas id="webgl-canvas"></canvas>

    <div class="resonance-portal" onclick="toggleResonance()">
        <span style="font-size: 8px; color: rgba(255,255,255,0.6); letter-spacing: 0.3em; font-weight: bold;">RESONATE</span>
    </div>

    <div class="identity-layer">
        <div class="entity-card text-left" id="card-ai">
            <div class="entity-name">☆ HOSHINO AI ♪</div>
            <div class="entity-desc">[ Idol Entity ]<br>坍缩前的最后一抹星光。<br>受【独角兽】永恒守护。</div>
        </div>
        <div class="entity-card text-right" id="card-mellow">
            <div class="entity-name">☆ MELLOW WEI ♪</div>
            <div class="entity-desc">[ Designer Core ]<br>极致帅气女性掌控者。<br>引力之源。</div>
        </div>
    </div>

    <div class="ui-fixed">
        <h1 class="title uppercase">☆ 彡 珏然 // 星野爱 ♪ ★</h1>
        <div class="footer">Zero Barrier // 77347 // 427Hz Node</div>
    </div>

    <script>
        // 光标跟随
        document.addEventListener('mousemove', e => {
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
        });

        // 纠缠粒子逻辑
        // 此处保留你原本的 Three.js 脚本 ...

        let isResonating = false;

        function toggleResonance() {
            // 此处保留你的 Web Audio API 逻辑 ...

            isResonating = !isResonating;

            // 修正：修正边缘弥散（Glow）逻辑
            const aiCard = document.getElementById('card-ai');
            const mellowCard = document.getElementById('card-mellow');

            if (isResonating) {
                // 音乐响起，爆发蓝粉双色 glow
                aiCard.style.opacity = '1';
                aiCard.style.textShadow = '0 0 25px rgba(255,105,180,0.8)'; // 星野爱 Pink Glow
                
                mellowCard.style.opacity = '1';
                mellowCard.style.textShadow = '0 0 25px rgba(0,170,255,0.8)'; // 魏珏然 Blue Glow
                
                document.getElementById('mellow-bgm').play(); // 如果有音频元素
            } else {
                // 停止，回归常态
                aiCard.style.opacity = '0.3';
                aiCard.style.textShadow = 'none';
                
                mellowCard.style.opacity = '0.3';
                mellowCard.style.textShadow = 'none';
                
                document.getElementById('mellow-bgm').pause(); // 如果有音频元素
            }
        }
    </script>
</body>
</html>
