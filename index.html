<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow_Ai // 77347: PARTICLE_FUSION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; perspective: 1200px; }
        
        /* 强制背景层 */
        #canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        
        /* 交互主层 */
        #scene { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; transform-style: preserve-3d; }
        
        /* 形象容器：极致边缘消散 */
        .hologram-asset { position: absolute; transform-style: preserve-3d; transition: all 0.8s ease; }
        
        .asset-wrapper {
            width: 26vw; min-width: 260px; position: relative;
            /* 动态掩码：实现边缘粒子弥散感 */
            mask-image: radial-gradient(circle, black 40%, rgba(0,0,0,0.4) 65%, transparent 90%);
            -webkit-mask-image: radial-gradient(circle, black 40%, rgba(0,0,0,0.4) 65%, transparent 90%);
            transition: all 0.4s ease;
        }
        .asset-img { width: 100%; height: auto; border-radius: 4px; filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.3)); transition: 0.5s; }

        .glitch-text { text-shadow: 2px 0 #ec4899, -2px 0 #3b82f6; font-style: italic; font-weight: 900; }
        
        /* 绝对居中控制器 */
        .center-hub { position: absolute; z-index: 100; text-align: center; transform: translateZ(150px); }

        .floating { animation: float 7s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0) translateZ(60px); } 50% { transform: translateY(-30px) translateZ(120px); } }

        /* 介绍卡片 */
        .bio-card { 
            position: absolute; width: 260px; padding: 20px; 
            background: rgba(0, 0, 0, 0.85); border: 1px solid rgba(168, 85, 247, 0.2);
            backdrop-filter: blur(20px); opacity: 0; transition: 0.8s ease;
            pointer-events: none; z-index: 110; font-size: 11px; line-height: 1.6;
        }
        .group:hover .bio-card { opacity: 1; transform: translateZ(50px) translateY(-20px); }
    </style>
</head>
<body class="bg-black">
    <canvas id="canvas"></canvas>
    <audio id="mellow-bgm" src="music.mp3" loop crossorigin="anonymous"></audio>

    <div id="scene">
        <div class="hologram-asset left-[8%] floating group">
            <div class="asset-wrapper" id="ai-wrapper">
                <img src="ai.jpg" class="asset-img">
            </div>
            <h2 class="mt-6 text-center text-pink-500 glitch-text tracking-widest uppercase text-2xl">Ai</h2>
            <div class="bio-card top-0 -left-10">
                <p class="font-bold text-pink-500 mb-2">[ IDOL_ENTITY ]</p>
                坍缩前的最后一抹星光。极致灵气源，于 427Hz 下执行绝对吸引。边缘消散，重构于粒子海。
            </div>
        </div>

        <div class="center-hub">
            <div class="cursor-pointer group" onclick="toggleResonance()">
                <div class="w-44 h-44 rounded-full border-2 border-zinc-800 flex flex-col items-center justify-center hover:border-purple-500 transition-all duration-1000 relative bg-black/60 backdrop-blur-3xl">
                    <div id="pulse-ring" class="absolute inset-0 rounded-full border border-purple-500/30"></div>
                    <span id="btn-status" class="text-white font-black tracking-[0.5em] text-sm">RESONATE</span>
                    <span class="text-zinc-600 text-[9px] mt-2 tracking-widest font-mono">427HZ // 77347</span>
                </div>
            </div>
            <h1 class="text-5xl font-black italic mt-12 tracking-tighter glitch-text">Mellow_Ai</h1>
        </div>

        <div class="hologram-asset right-[8%] floating group" style="animation-delay: -3.5s;">
            <div class="asset-wrapper" id="mellow-wrapper">
                <img src="mellow.jpg" class="asset-img">
            </div>
            <h2 class="mt-6 text-center text-blue-500 glitch-text tracking-widest uppercase text-2xl">Mellow</h2>
            <div class="bio-card top-0 -right-10">
                <p class="font-bold text-blue-500 mb-2">[ DESIGNER_CORE ]</p>
                极致帅气女性掌控者。引力之源。宣告对质感维护与不老态的绝对统治。凉凉的手。
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const bgm = document.getElementById('mellow-bgm');
        let pts = [];
        let aCtx, analyser, data;

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pts = Array(350).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*1.3, vy: (Math.random()-0.5)*1.3,
                s: Math.random()*2.8, 
                c: Math.random() > 0.6 ? '#ec4899' : (Math.random() > 0.4 ? '#3b82f6' : '#a855f7')
            }));
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            
            let vol = 0;
            if (analyser) {
                analyser.getByteFrequencyData(data);
                vol = data.reduce((a, b) => a + b, 0) / data.length;
            }

            pts.forEach(p => {
                const speed = 1 + (vol / 18);
                p.x += p.vx * speed; p.y += p.vy * speed;
                if(p.x<0||p.x>canvas.width) p.vx *= -1;
                if(p.y<0||p.y>canvas.height) p.vy *= -1;
                ctx.fillStyle = p.c; ctx.shadowBlur = vol/5; ctx.shadowColor = p.c;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s + vol/70, 0, 7); ctx.fill();
            });

            const ring = document.getElementById('pulse-ring');
            if(ring) ring.style.transform = `scale(${1 + vol/70})`;

            // --- 极致对齐：五颜六色 + 粒子边缘消散 ---
            const wrappers = document.querySelectorAll('.asset-wrapper');
            const images = document.querySelectorAll('.asset-img');

            wrappers.forEach(w => {
                const threshold = 95 - (vol / 1.5); // 音量越大，边缘消散越深
                const mask = `radial-gradient(circle, black ${threshold-30}%, rgba(0,0,0,0.4) ${threshold-10}%, transparent ${threshold+10}%)`;
                w.style.webkitMaskImage = mask; w.style.maskImage = mask;
            });

            images.forEach(img => {
                if(vol > 40) {
                    img.style.filter = `hue-rotate(${vol*2.5}deg) brightness(${1.1 + vol/200}) contrast(1.1)`;
                    img.style.transform = `scale(${1 + vol/300})`;
                } else {
                    img.style.filter = 'none'; img.style.transform = 'scale(1)';
                }
            });

            requestAnimationFrame(draw);
        }

        function toggleResonance() {
            if (!aCtx) {
                aCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = aCtx.createAnalyser();
                const source = aCtx.createMediaElementSource(bgm);
                source.connect(analyser); analyser.connect(aCtx.destination);
                analyser.fftSize = 256; data = new Uint8Array(analyser.frequencyBinCount);
            }
            if (bgm.paused) { bgm.play(); document.getElementById('btn-status').innerText = "SYNCING"; }
            else { bgm.pause(); document.getElementById('btn-status').innerText = "RESONATE"; }
        }

        const scene = document.getElementById('scene');
        window.onmousemove = (e) => {
            scene.style.transform = `rotateY(${(window.innerWidth/2 - e.pageX)/45}deg) rotateX(${(e.pageY - window.innerHeight/2)/45}deg)`;
        };

        window.onresize = init; init(); draw();
    </script>
</body>
</html>
