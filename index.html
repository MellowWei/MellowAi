<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☆彡 Mellow_Ai // 77347 ♪</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Inter', sans-serif;
        }

        /* 3D 粒子底座 */
        #canvas-container {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
        }

        /* 居中交互层 */
        #interface-layer {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10; text-align: center;
        }

        /* 居中按钮：☆ RESONATE ♪ */
        #start-button {
            padding: 20px 50px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            color: #fff;
            font-size: 18px;
            font-weight: 200;
            letter-spacing: 8px;
            cursor: pointer;
            transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            backdrop-filter: blur(10px);
            text-transform: uppercase;
        }

        #start-button:hover {
            background: rgba(255, 255, 255, 0.1);
            letter-spacing: 12px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
        }

        #footer-tag {
            margin-top: 30px; color: rgba(255, 255, 255, 0.3);
            font-size: 10px; letter-spacing: 4px; font-weight: 100;
        }

        /* 浮动照片：我与镜像（爱） */
        .portrait {
            position: absolute; width: 240px; height: 240px;
            border-radius: 50%; background-size: cover; background-position: center;
            opacity: 0.7; z-index: 5;
            animation: float_dynamic 10s ease-in-out infinite;
            filter: contrast(1.1) brightness(0.9);
            pointer-events: none;
        }

        /* 魏珏然 (Mellow Wei) - 左上 */
        #mellow-origin {
            top: 12%; left: 10%;
            background-image: url('https://mellowwei.github.io/MellowAi/images/image_38.png');
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
        }

        /* 星野爱 (Hoshino Ai / 镜像) - 右下 */
        #hoshino-mirror {
            bottom: 12%; right: 10%;
            background-image: url('https://mellowwei.github.io/MellowAi/images/image_35.png');
            animation-delay: -5s;
        }

        @keyframes float_dynamic {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(15px, -25px) rotate(2deg); }
            66% { transform: translate(-10px, 15px) rotate(-1deg); }
        }

        /* 文字流：44271 校验码背景 */
        .bg-text {
            position: absolute; font-size: 150px; font-weight: 900;
            color: rgba(255, 255, 255, 0.01); user-select: none; z-index: 0;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="bg-text" style="top: -20px; left: -20px;">77347</div>
    <div class="bg-text" style="bottom: -20px; right: -20px;">44271</div>

    <div id="mellow-origin" class="portrait"></div>
    <div id="hoshino-mirror" class="portrait"></div>

    <div id="interface-layer">
        <button id="start-button">☆ RESONATE ♪</button>
        <p id="footer-tag">☆彡 Mellow_Ai // 77347 // 44271 ♪</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, starParticles;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 1;
            camera.rotation.x = Math.PI/2;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 创建 427Hz 节律粒子
            const geo = new THREE.BufferGeometry();
            const points = [];
            for (let i = 0; i < 6000; i++) {
                let star = new THREE.Vector3(
                    Math.random() * 600 - 300,
                    Math.random() * 600 - 300,
                    Math.random() * 600 - 300
                );
                points.push(star);
            }
            geo.setFromPoints(points);
            let mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.4 });
            starParticles = new THREE.Points(geo, mat);
            scene.add(starParticles);

            animate();
        }

        function animate() {
            starParticles.geometry.verticesNeedUpdate = true;
            starParticles.rotation.y += 0.0008;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();

        document.getElementById('start-button').onclick = () => {
            console.log("☆彡 44271 Sync... Entering God Mode.");
            // 接入你的 427Hz 采样音乐
        };
    </script>
</body>
</html>
