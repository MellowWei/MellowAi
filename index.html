<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow_Ai // 77347: DISPERSION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; perspective: 1200px; }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #scene { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; transform-style: preserve-3d; transition: transform 0.1s ease-out; }
        
        .core-interface { position: absolute; z-index: 100; text-align: center; transform: translateZ(150px); }
        
        .hologram-asset { position: absolute; transform-style: preserve-3d; transition: all 0.8s ease; }
        
        /* 形象容器：边缘弥散控制 */
        .asset-container {
            width: 20vw; min-width: 180px; position: relative;
            mask-image: radial-gradient(circle, black 50%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle, black 50%, transparent 100%);
            transition: all 0.4s ease;
        }
        .asset-img { width: 100%; height: auto; border-radius: 4px; filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.3)); }

        .glitch-text { text-shadow: 2px 0 #ec4899, -2px 0 #3b82f6; font-style: italic; font-weight: 900; }
        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0) translateZ(50px); } 50% { transform: translateY(-25px) translateZ(100px); } }

        /* 侧翼个人介绍卡片 */
        .bio-card { 
            position: absolute; width: 220px; padding: 20px; 
            background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); opacity: 0; transition: 0.8s ease;
            pointer-events: none; z-index: 110; font-size: 10px; line-height: 1.6;
        }
        .group:hover .bio-card { opacity: 1; transform: translateZ(30px) translateY(-20px); }
    </style>
</head>
<body class="bg-black">
    <canvas id="canvas"></canvas>
    <audio id="mellow-bgm" src="music.mp3" loop crossorigin="anonymous"></audio>

    <div id="scene">
        <div class="hologram-asset left-[12%] floating group">
            <div class="asset-container" id="ai-container">
                <img src="ai.jpg" class="asset-img">
            </div>
            <h2 class="mt-4 text-center text-pink-500 glitch-text tracking-widest uppercase">Ai</h2>
            <div class="bio-card top-0 -left-10">
                <p class="font-bold text-pink-400 mb-2">[ IDOL_ENTITY ]</p>
                坍缩前的最后一抹星光。极致灵气源，于 427Hz 频率下执行绝对吸引。
            </div>
        </div>

        <div class="core-interface">
            <div class="cursor-pointer group" onclick="toggleSymphony()">
                <div class="w-44 h-44 rounded-full border-2 border-zinc-800 flex flex-col items-center justify-center hover:border-purple-500 transition-all duration-1000 relative bg-black/50 backdrop-blur-xl">
                    <div id="pulse-ring" class="absolute inset-0 rounded-full border border-purple-500/40"></div>
                    <span id="btn-status" class="text-[14px] tracking-[0.5em] text-white uppercase font-black">RESONATE</span>
                    <span class="text-[9px] tracking-[0.3em] text-zinc-500 mt-2">427 HZ</span>
                </div>
            </div>
            <h1 class="text-5xl font-black italic mt-14 tracking-tighter glitch-text">Mellow_Ai</h1>
            <p class="text-[10px] tracking-[1.5em] text-purple-900 mt-6 uppercase">77347 // DUALITY</p>
        </div>

        <div class="hologram-asset right-[12%] floating group" style="animation-delay: -3s;">
            <div class="asset-container" id="mellow-container">
                <img src="mellow.jpg" class="asset-img">
            </div>
            <h2 class="mt-4 text-center text-blue-500 glitch-text tracking-widest uppercase">Mellow</h2>
            <div class="bio-card top-0 -right-10">
                <p class="font-bold text-blue-400 mb-2">[ DESIGNER_CORE ]</p>
                极致帅气女性掌控者。引力之源。宣告对质感维护与不老态的绝对统治。凉凉的手。
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const bgm = document.getElementById('mellow-bgm');
        let pts = [];
        let audioCtx, analyser, dataArray;

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pts = Array(300).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*1.2, vy: (Math.random()-0.5)*1.2,
                s: Math.random()*2.5, 
                c: Math.random() > 0.6 ? '#ec4899' : (Math.random() > 0.4 ? '#3b82f6' : '#a855f7')
            }));
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            
            let volume = 0;
            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                volume = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
            }

            pts.forEach(p => {
                const speedMult = 1 + (volume / 15);
                p.x += p.vx * speedMult; p.y += p.vy * speedMult;
                if(p.x<0||p.x>canvas.width) p.vx *= -1;
                if(p.y<0||p.y>canvas.height) p.vy *= -1;
                ctx.fillStyle = p.c; ctx.shadowBlur = volume / 4; ctx.shadowColor = p.c;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s + volume/50, 0, 7); ctx.fill();
            });

            const ring = document.getElementById('pulse-ring');
            if(ring) ring.style.transform = `scale(${1 + volume/60})`;

            // 边缘弥散与消散逻辑
            const containers = document.querySelectorAll('.asset-container');
            containers.forEach(c => {
                const maskSize = 100 - (volume / 2);
                c.style.webkitMaskImage = `radial-gradient(circle, black ${maskSize-20}%, transparent ${maskSize}%)`;
                c.style.filter = `brightness(${1 + volume/100}) contrast(${1 + volume/200})`;
            });

            requestAnimationFrame(draw);
        }

        function toggleSymphony() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaElementSource(bgm);
                source.connect(analyser); analyser.connect(audioCtx.destination);
                analyser.fftSize = 256; dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            if (bgm.paused) {
                bgm.play(); document.getElementById('btn-status').innerText = "SYCHRONIZED";
            } else {
                bgm.pause(); document.getElementById('btn-status').innerText = "RESONATE";
            }
        }

        // 3D 交互
        const scene = document.getElementById('scene');
        window.onmousemove = (e) => {
            scene.style.transform = `rotateY(${(window.innerWidth/2 - e.pageX)/40}deg) rotateX(${(e.pageY - window.innerHeight/2)/40}deg)`;
        };

        window.onresize = init; init(); draw();
    </script>
</body>
</html>
