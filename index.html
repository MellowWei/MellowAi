<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>☆彡 Mellow_Ai // 77347 ♪</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; cursor: none; }
        #canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        
        /* 核心 UI 逻辑保持锁定 */
        .core-hub { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 500; text-align: center; width: 100vw; pointer-events: none; }
        .core-hub * { pointer-events: auto; }
        .mellow-title { font-size: clamp(1.6rem, 6.5vw, 4rem); font-weight: 900; font-style: italic; margin-top: 2.5rem; letter-spacing: -0.02em; text-transform: uppercase; text-shadow: 4px 0 rgba(236, 72, 153, 0.7), -4px 0 rgba(59, 130, 246, 0.7); filter: drop-shadow(0 0 15px rgba(255,255,255,0.1)); }
        
        #main-layout { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: flex; justify-content: space-between; align-items: center; padding: 0 6%; }
        .entity-card { width: 25vw; max-width: 380px; transition: all 1s cubic-bezier(0.19, 1, 0.22, 1); opacity: 1; will-change: filter, transform; }
        .entity-img { width: 100%; height: auto; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .bio-box { margin-top: 20px; padding: 25px; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }

        /* 音乐开启后的边缘弥散 */
        .resonating-ai { filter: drop-shadow(0 0 50px rgba(236, 72, 153, 0.8)); transform: scale(1.08) translateX(15px); }
        .resonating-mellow { filter: drop-shadow(0 0 50px rgba(59, 130, 246, 0.8)); transform: scale(1.08) translateX(-15px); }

        .footer { position: fixed; bottom: 40px; width: 100%; text-align: center; font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 0.8em; text-transform: uppercase; }
        #cursor { width: 10px; height: 10px; background: #fff; border-radius: 50%; position: fixed; pointer-events: none; z-index: 1000; transform: translate(-50%, -50%); box-shadow: 0 0 15px #fff; }
    </style>
</head>
<body class="bg-black">
    <div id="cursor"></div>
    <canvas id="canvas"></canvas>
    <audio id="mellow-bgm" src="music.mp3" loop crossorigin="anonymous"></audio>

    <div class="core-hub">
        <div class="resonance-btn cursor-pointer inline-block" onclick="toggleResonance()">
            <div class="w-44 h-44 lg:w-56 lg:h-56 rounded-full border border-zinc-800 flex flex-col items-center justify-center bg-black/40 backdrop-blur-3xl relative">
                <div id="ring" class="absolute inset-0 rounded-full border-2 border-white/5 scale-110"></div>
                <span id="label" class="text-white font-black tracking-[0.5em] text-[10px] uppercase opacity-60">☆ RESONATE ♪</span>
            </div>
        </div>
        <h1 class="mellow-title tracking-tighter">☆彡 Mellow_Ai // 77347 ♪</h1>
    </div>

    <div id="main-layout">
        <div id="ai-card" class="entity-card"><img src="ai.jpg" class="entity-img"><div class="bio-box"><h2 class="text-pink-500 font-black italic text-3xl mb-3">☆ HOSHINO AI ♪</h2><p class="text-[12px] text-zinc-400">坍缩前的最后一抹星光。</p></div></div>
        <div id="mellow-card" class="entity-card"><img src="mellow.jpg" class="entity-img"><div class="bio-box text-right" style="border-right: 2px solid #3b82f6;"><h2 class="text-blue-500 font-black italic text-3xl mb-3">☆ MELLOW WEI ♪</h2><p class="text-[12px] text-zinc-400">极致帅气女性掌控者。</p></div></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const bgm = document.getElementById('mellow-bgm');
        let pts = [], aCtx, analyser, data;
        const symbols = ['☆彡', '♪', '愛', '77347', 'Qualia'];

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pts = Array(window.innerWidth < 768 ? 150 : 400).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*0.8, vy: (Math.random()-0.5)*0.8,
                s: Math.random()*2, 
                c: Math.random() > 0.6 ? '#ec4899' : (Math.random() > 0.4 ? '#3b82f6' : '#ffffff20'),
                t: Math.random() > 0.85 ? symbols[Math.floor(Math.random()*symbols.length)] : null
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let v = 0;
            if(analyser) { 
                analyser.getByteFrequencyData(data); 
                v = data.reduce((a,b)=>a+b,0)/data.length; 
            }

            pts.forEach(p => {
                // 核心动力：随音量系数爆发位移
                let m = 1 + v/10; 
                p.x += p.vx * m; p.y += p.vy * m;

                if(p.x<0||p.x>canvas.width) p.vx*=-1;
                if(p.y<0||p.y>canvas.height) p.vy*=-1;

                ctx.globalAlpha = 0.4 + v/255;
                if (p.t) {
                    ctx.font = `${8 + v/10}px sans-serif`;
                    ctx.fillStyle = p.c; ctx.fillText(p.t, p.x, p.y);
                } else {
                    ctx.fillStyle = p.c;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.s + v/60, 0, 7); ctx.fill();
                }
            });

            const ring = document.getElementById('ring');
            if(ring) ring.style.transform = `scale(${1 + v/60}) rotate(${v}deg)`;
            requestAnimationFrame(draw);
        }

        function toggleResonance() {
            if(!aCtx) {
                aCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = aCtx.createAnalyser();
                const s = aCtx.createMediaElementSource(bgm);
                s.connect(analyser); analyser.connect(aCtx.destination);
                analyser.fftSize = 256; data = new Uint8Array(analyser.frequencyBinCount);
            }
            const aiCard = document.getElementById('ai-card');
            const mellowCard = document.getElementById('mellow-card');
            if(bgm.paused) { 
                bgm.play(); document.getElementById('label').innerText = "☆ SYNCED ♪";
                aiCard.classList.add('resonating-ai'); mellowCard.classList.add('resonating-mellow');
            } else { 
                bgm.pause(); document.getElementById('label').innerText = "☆ RESONATE ♪"; 
                aiCard.classList.remove('resonating-ai'); mellowCard.classList.remove('resonating-mellow');
            }
        }
        document.addEventListener('mousemove', e => {
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
        });
        window.onresize = init; init(); draw();
    </script>
</body>
</html>
