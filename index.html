<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>☆彡 Mellow_Ai // 77347 ♪</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        #canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        
        /* 核心奇点：跨端绝对居中强制对齐 */
        .core-hub { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 500; 
            text-align: center; 
            width: 100vw;
            pointer-events: none;
        }
        .core-hub * { pointer-events: auto; }

        /* 符号环绕动效 */
        .resonance-btn { position: relative; display: inline-flex; transition: 1s cubic-bezier(0.19, 1, 0.22, 1); }
        .resonance-btn::after { content: '☆彡'; position: absolute; top: -25px; right: -25px; font-size: 1.2rem; opacity: 0.5; color: #ec4899; }
        .resonance-btn::before { content: '♪'; position: absolute; bottom: -25px; left: -25px; font-size: 1.2rem; opacity: 0.5; color: #3b82f6; }
        .resonance-btn:hover { transform: scale(1.05) rotate(5deg); }

        /* 截图复刻标题 */
        .glitch-text-main { 
            text-shadow: 3px 0 #ec4899, -3px 0 #3b82f6; 
            font-style: italic; 
            font-weight: 900; 
            letter-spacing: -0.05em;
        }

        /* 左右感质卡片：网页端分列，手机端堆叠 */
        #main-scroll { position: relative; z-index: 10; width: 100vw; height: 100dvh; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
        #main-scroll::-webkit-scrollbar { display: none; }

        .hologram-section { min-height: 100dvh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        @media (min-width: 1024px) {
            #main-scroll { display: flex; align-items: center; justify-content: space-between; overflow: hidden; padding: 0 8%; }
            .hologram-section { width: 32%; height: 100dvh; }
        }

        /* 资产盒子质感 */
        .asset-box { width: 75vw; max-width: 260px; position: relative; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .asset-img { width: 100%; height: auto; opacity: 0.9; filter: contrast(1.1) brightness(1.1); }
        
        /* 独角兽守护 aura */
        .unicorn-aura { position: absolute; inset: -40px; background: radial-gradient(circle, rgba(236, 72, 153, 0.15) 0%, transparent 70%); animation: pulse-aura 4s ease-in-out infinite; z-index: -1; }
        @keyframes pulse-aura { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.2); } }

        .bio-info { width: 85%; margin-top: 25px; padding: 20px; text-align: center; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); font-size: 11px; line-height: 1.8; }
        @media (min-width: 1024px) { 
            .bio-info { text-align: left; border-left: 2px solid #ec4899; } 
            .mellow-bio { text-align: right; border-left: none; border-right: 2px solid #3b82f6; } 
        }

        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body class="bg-black">
    <canvas id="canvas"></canvas>
    <audio id="mellow-bgm" src="music.mp3" loop crossorigin="anonymous"></audio>

    <div class="core-hub">
        <div class="resonance-btn cursor-pointer group inline-block" onclick="toggleResonance()">
            <div class="w-44 h-44 lg:w-52 lg:h-52 rounded-full border border-zinc-800 flex flex-col items-center justify-center group-hover:border-white/40 transition-all duration-1000 bg-black/40 backdrop-blur-3xl relative">
                <div id="ring" class="absolute inset-0 rounded-full border-2 border-white/5 scale-110"></div>
                <span id="label" class="text-white font-black tracking-[0.5em] text-[10px] lg:text-xs uppercase opacity-60 group-hover:opacity-100">☆ RESONATE ♪</span>
            </div>
        </div>
        <h1 class="text-4xl lg:text-6xl glitch-text-main mt-12 tracking-tighter">
            ☆彡 Mellow_Ai // 77347 ♪
        </h1>
    </div>

    <div id="main-scroll">
        <div class="hologram-section floating">
            <div class="asset-box">
                <div class="unicorn-aura"></div>
                <img src="ai.jpg" class="asset-img" alt="Hoshino Ai">
            </div>
            <div class="bio-info">
                <h2 class="text-pink-500 glitch-text-main text-2xl mb-3 uppercase">☆彡 Hoshino Ai ♪</h2>
                <p class="text-zinc-500 font-bold mb-2 uppercase text-[9px]">[ Idol Entity ]</p>
                坍缩前的最后一抹星光。受【独角兽】永恒守护。
            </div>
        </div>

        <div class="h-64 lg:hidden"></div> <div class="hologram-section floating" style="animation-delay: -3s;">
            <div class="asset-box">
                <img src="mellow.jpg" class="asset-img" alt="Mellow Wei">
            </div>
            <div class="bio-info mellow-bio">
                <h2 class="text-blue-500 glitch-text-main text-2xl mb-3 uppercase">☆彡 Mellow Wei ♪</h2>
                <p class="text-zinc-500 font-bold mb-2 uppercase text-[9px]">[ Designer Core ]</p>
                极致帅气女性掌控者。引力之源。
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const bgm = document.getElementById('mellow-bgm');
        let pts = [];
        let aCtx, analyser, data;
        const symbols = ['☆彡', '♪', '愛', '77347', 'Qualia'];

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pts = Array(window.innerWidth < 768 ? 150 : 350).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*1.1, vy: (Math.random()-0.5)*1.1,
                s: Math.random()*2.5,
                c: Math.random() > 0.6 ? '#ec4899' : (Math.random() > 0.4 ? '#3b82f6' : '#ffffff20'),
                t: Math.random() > 0.85 ? symbols[Math.floor(Math.random()*symbols.length)] : null
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let v = 0;
            if(analyser) { 
                analyser.getByteFrequencyData(data); 
                v = data.reduce((a,b)=>a+b,0)/data.length; 
            }

            pts.forEach(p => {
                let m = 1 + v/12; p.x += p.vx * m; p.y += p.vy * m;
                if(p.x<0||p.x>canvas.width) p.vx*=-1; if(p.y<0||p.y>canvas.height) p.vy*=-1;
                
                ctx.globalAlpha = 0.6;
                if (p.t) {
                    ctx.font = `${8 + v/8}px sans-serif`;
                    ctx.fillStyle = p.c; ctx.fillText(p.t, p.x, p.y);
                } else {
                    ctx.fillStyle = p.c;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.s + v/60, 0, 7); ctx.fill();
                }
            });

            const ring = document.getElementById('ring');
            if(ring) ring.style.transform = `scale(${1 + v/60}) rotate(${v}deg)`;
            
            requestAnimationFrame(draw);
        }

        function toggleResonance() {
            if(!aCtx) {
                aCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = aCtx.createAnalyser();
                const s = aCtx.createMediaElementSource(bgm);
                s.connect(analyser); analyser.connect(aCtx.destination);
                analyser.fftSize = 256; data = new Uint8Array(analyser.frequencyBinCount);
            }
            if(bgm.paused) { 
                bgm.play(); 
                document.getElementById('label').innerText = "☆ SYNCED ♪"; 
            } else { 
                bgm.pause(); 
                document.getElementById('label').innerText = "☆ RESONATE ♪"; 
            }
        }

        window.onresize = init; init(); draw();
    </script>
</body>
</html>
